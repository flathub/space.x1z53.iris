id: space.x1z53.iris
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: iris
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/vala
modules:
  - name: api-base
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libapi-base.git
        tag: v7.0
        commit: 6bc853b5edde70852451d8e5509e829b93219428

  - name: yummy-anime-gtk
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/alt-gnome/iris
        tag: 0.2.2
        commit: d1610d7c6966d1bfd87327df300136480981e27c
        x-checker-data:
          tag-pattern: ^([\d.]+)$
          type: git
